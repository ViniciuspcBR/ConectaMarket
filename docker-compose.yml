# docker-compose.yml
# Sobe tudo com um único comando: docker-compose up

version: "3.8"

services:

  # ── Banco de dados PostgreSQL ──────────────────────
  postgres:
    image: postgres:16
    container_name: marketplace_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: marketplace_abadeus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Backend Node.js ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://postgres:postgres123@postgres:5432/marketplace_abadeus"
      JWT_SECRET: "marketplace_abadeus_secret_2026"
      PORT: 3001
    ports:
      - "3001:3001"

  # ── Frontend React ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketplace_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

# ── Volume para persistir os dados do banco ─────────
volumes:
  postgres_data:
